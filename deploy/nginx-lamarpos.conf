# ============================================
# Nginx config for lamarpos.cloud
# ============================================
# Place this file at: /etc/nginx/sites-available/lamarpos
# Then: sudo ln -s /etc/nginx/sites-available/lamarpos /etc/nginx/sites-enabled/
# Then: sudo nginx -t && sudo systemctl reload nginx
# ============================================

# Backend API - api.lamarpos.cloud
server {
    listen 80;
    server_name api.lamarpos.cloud;

    # Max upload size (for menu item images etc)
    client_max_body_size 10M;

    location / {
        proxy_pass http://127.0.0.1:5001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts for long-running requests
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}

# POS Dashboard - sahla.lamarpos.cloud
server {
    listen 80;
    server_name sahla.lamarpos.cloud;

    root /var/www/sahla;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    # NEVER cache index.html — browser must always fetch fresh to pick up new asset hashes
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires -1;
    }

    # Cache static assets (they have content-hash in filename so safe to cache long)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback - all routes go to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}

